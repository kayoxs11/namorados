<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devocional Diário para Casais</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="logo1.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Kedebideri:wght@400;500;600;700;800;900&family=Sacramento&display=swap');
  </style>
</head>
<body>

  <!-- Fundo decorativo -->
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="logo-area">
      <span class="heart-icon">✦</span>
      <h1 class="site-title">Amor & Fé</h1>
    </div>
    <p class="site-subtitle">DEVOCIONAL DIÁRIO PARA CASAIS</p>
  </header>

  <!-- Card principal -->
  <main class="main-content">
    <div class="devocional-card" id="devocionalCard">

      <!-- Badge do dia -->
      <div class="day-badge" id="dayBadge">
        <span class="badge-icon">✦</span>
        <span id="dayNumber">DIA 1 DE 365</span>
      </div>

      <!-- Título do devocional -->
      <h2 class="devocional-title" id="devocionalTitle">Carregando...</h2>

      <!-- Versículo -->
      <div class="versiculo-block">
        <p class="versiculo-text" id="versiculoText"></p>
        <span class="versiculo-ref" id="versiculoRef"></span>
      </div>

      <!-- Separador ornamental -->
      <div class="ornament">✦ ✦ ✦</div>

      <!-- Reflexão -->
      <div class="reflexao-block">
        <h3 class="reflexao-label">Reflexão</h3>
        <p class="reflexao-text" id="reflexaoText"></p>
      </div>

      <!-- Oração -->
      <div class="oracao-block">
        <h3 class="oracao-label">✦ Oração do Casal</h3>
        <p class="oracao-text" id="oracaoText"></p>
      </div>

      <!-- Desafio do dia -->
      <div class="desafio-block">
        <h3 class="desafio-label">Desafio de Hoje</h3>
        <p class="desafio-text" id="desafioText"></p>
      </div>

      <!-- Barra de progresso -->
      <div class="card-footer">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-label" id="progressLabel">Progresso no ano</p>
      </div>

    </div>

    <!-- Timer até meia-noite -->
    <div class="timer-card">
      <p class="timer-label">PRÓXIMO DEVOCIONAL EM</p>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <p class="timer-sub">Todo dia às <strong>00:00</strong> um novo devocional</p>
      <p class="timer-date" id="timerDate"></p>
    </div>

  </main>

  <footer class="site-footer">
    <p>Desenvolvido por <a href="https://vyerak.lovable.app/" target="_blank" rel="noopener" class="dev-link">Vyerak</a></p>
  </footer>

  <script src="script.js"></script>
  <script src="app.js"></script>
</body>
</html>
